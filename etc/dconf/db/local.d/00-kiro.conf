# Kiro ohmyniri — system-wide GTK appearance defaults (delivered via dconf).
# Static Tokyo Night look (matching kiro-hyprland); these set the base look so
# GTK/GNOME-stack apps are dark and use the Kiro cursor out of the box.
[org/gnome/desktop/interface]
color-scheme='prefer-dark'
gtk-theme='adw-gtk3-dark'
icon-theme='Papirus-Dark'
cursor-theme='Bibata-Modern-Ice'
cursor-size=24
